<style>
        .football-pattern {
            background-color: #f8f9ff;
            background-image: radial-gradient(#d9e3f6 1.5px, transparent 1.5px);
            background-size: 32px 32px;
            position: relative;
        }
        .football-pattern::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 55, 176, 0.03) 0%, rgba(248, 249, 255, 0) 100%);
            pointer-events: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(229, 231, 235, 0.5);
        }
        .ai-glow-focus:focus-within {
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.15);
            border-color: #0037b0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-lg min-h-screen flex flex-col football-pattern">
<!-- Top Brand Section -->
<header class="w-full pt-xl pb-lg px-lg flex flex-col items-center text-center">
<div class="mb-md">
<div class="w-16 h-16 bg-[#1F2937] rounded-xl flex items-center justify-center shadow-xl">
<span class="material-symbols-outlined text-white text-4xl" data-icon="sports_soccer">sports_soccer</span>
</div>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">TeamPilot AI</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Elite Tactical Control</p>
</header>
<!-- Main Content / Form Section -->
<main class="flex-grow px-lg flex flex-col justify-center">
<div class="glass-card rounded-2xl p-lg shadow-sm w-full max-w-sm mx-auto">
<div class="mb-lg">
<h2 class="font-headline-md text-headline-md text-on-surface">Welcome Back</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Sign in to manage your squad</p>
</div>
<form class="space-y-md">
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Manager Email</label>
<div class="relative ai-glow-focus rounded-lg transition-all">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-md py-3 bg-surface border border-outline-variant rounded-lg font-body-lg text-body-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" id="email" placeholder="coach@teampilot.ai" type="email"/>
</div>
</div>
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Security Key</label>
<button class="font-label-caps text-label-caps text-primary" type="button">Forgot?</button>
</div>
<div class="relative ai-glow-focus rounded-lg transition-all">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-md py-3 bg-surface border border-outline-variant rounded-lg font-body-lg text-body-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center space-x-sm py-xs">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant" for="remember">Stay logged in for game day</label>
</div>
<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md py-4 rounded-xl shadow-lg active:scale-[0.98] transition-transform flex items-center justify-center space-x-sm" type="submit">
<span>Access Tactical Dashboard</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-lg pt-lg border-t border-outline-variant flex flex-col items-center">
<p class="font-label-caps text-label-caps text-on-surface-variant mb-md">Quick Access</p>
<div class="flex space-x-lg">
<button class="w-14 h-14 rounded-full border border-outline-variant flex items-center justify-center text-on-surface hover:bg-surface-container transition-colors active:scale-90">
<span class="material-symbols-outlined text-2xl" data-icon="fingerprint">fingerprint</span>
</button>
<button class="w-14 h-14 rounded-full border border-outline-variant flex items-center justify-center text-on-surface hover:bg-surface-container transition-colors active:scale-90">
<span class="material-symbols-outlined text-2xl" data-icon="face">face</span>
</button>
</div>
</div>
</div>
</main>
<!-- Footer / Bottom Safe Area -->
<footer class="w-full px-lg py-lg mt-auto text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
            Don't have access? <a class="text-primary font-bold" href="#">Contact Club Admin</a>
</p>
<div class="mt-md flex justify-center space-x-md text-outline">
<span class="font-label-caps text-label-caps">v2.4.0-Stable</span>
<span class="font-label-caps text-label-caps">•</span>
<span class="font-label-caps text-label-caps">Secure Lab Encrypted</span>
</div>
<!-- Safe Area Spacer for iOS/Android -->
<div class="h-6"></div>
</footer>
